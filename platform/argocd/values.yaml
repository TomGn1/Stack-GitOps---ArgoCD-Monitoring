global:
  domain: argocd.morguen.fr

configs:
  params:
    # désactivation du HTTPS interne car Ingress gère le TLS
    server.insecure: true

server:
  ingress:
    enabled: true
    ingressClassName: traefik  # ingress controller K3s par défaut
    hostname: argocd.morguen.fr
    tls: true
    annotations:
      # génération automatique du certificat Let's Encrypt
      cert-manager.io/cluster-issuer: letsencrypt-prod

  # limitation des ressources single-node
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
